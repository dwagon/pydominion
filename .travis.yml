language: python
sudo: required
dist: xenial

python:
    - "2.7"
    - "3.5"
    - "3.6"
    - "3.7"
    - "3.8"
    - "3.9-dev"

install:
    - "pip install -r requirements.txt"
    - "pip install -r requirements-dev.txt"

stages:
  - lint
  - test

jobs:
  include:
    - stage: lint
      script: flake8 src
      script: PYTHONPATH=src pylint --exit-zero src
    - stage: test
      script: "./src/run_tests"

after_success:
    coveralls --data_file src/.coverage
